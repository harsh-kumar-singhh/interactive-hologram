<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hologram</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="container">
    <h1>Interactive Hologram</h1>
    <p>Choose a monument to project into the holographic display.</p>

    <!-- Monument Selection Grid Container -->
    <div class="monument-grid" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px;">
        
        <!-- Eiffel Tower Card (Selected by Default) -->
        <div class="card monument-card selected" data-model="eiffel">
            <img src="images/Eiffel_Tower.webp" alt="Eiffel Tower">
            <div class="content">
                <h2>Eiffel Tower</h2>
            </div>
        </div>

        <!-- Big Ben Card -->
        <div class="card monument-card" data-model="bigben">
            <img src="images/Big_Ben.webp" alt="Big Ben">
            <div class="content">
                <h2>Big Ben</h2>
            </div>
        </div>

        <!-- Statue of Liberty Card -->
        <div class="card monument-card" data-model="statue">
            <img src="images/Statue_Of_Liberty.webp" alt="Statue of Liberty">
            <div class="content">
                <h2>Statue of Liberty</h2>
            </div>
        </div>

        <!-- Christ the Redeemer Card -->
        <div class="card monument-card" data-model="christ">
            <img src="images/Christ_The_Redeemer.webp" alt="Christ the Redeemer">
            <div class="content">
                <h2>Christ the Redeemer</h2>
            </div>
        </div>

        <!-- Arc de Triomphe Card -->
        <div class="card monument-card" data-model="arc">
            <img src="images/Arc_De_Triomphe.webp" alt="Arc de Triomphe">
            <div class="content">
                <h2>Arc de Triomphe</h2>
            </div>
        </div>

        <!-- Sydney Opera House Card -->
        <div class="card monument-card" data-model="opera">
            <img src="images/Sydney_Opera_House.webp" alt="Sydney Opera House">
            <div class="content">
                <h2>Sydney Opera House</h2>
            </div>
        </div>

        <!-- Burj Khalifa Card -->
        <div class="card monument-card" data-model="burj_khalifa">
            <img src="images/Burj_Khalifa.webp" alt="Burj Khalifa">
            <div class="content">
                <h2>Burj Khalifa</h2>
            </div>
        </div>

        <!-- Leaning Tower of Pisa Card -->
        <div class="card monument-card" data-model="leaning_tower">
            <img src="images/Leaning_Tower.webp" alt="Leaning Tower of Pisa">
            <div class="content">
                <h2>Leaning Tower of Pisa</h2>
            </div>
        </div>

    </div>

    <!-- Action Button Trigger -->
    <div style="text-align: center;">
        <button id="selectBtn">Display Hologram</button>
    </div>
</div>

<!-- Loading Modal -->
<div id="loadingModal" class="modal">
    <div class="modal-box">
        <div class="icon" id="modalIcon">🗼</div>
        <h2 id="modalTitle">Eiffel Tower Selected</h2>
        <p id="statusText">Connecting to Holographic Display...</p>
        <div class="progress">
            <div id="progressBar"></div>
        </div>
        <p class="percent" id="percentText">0%</p>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>

</html>
