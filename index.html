<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Hologram</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<h1>
Interactive Hologram
</h1>

<p>
Choose a monument to project into the holographic display.
</p>

<div class="card">

<img src="images/Eiffel_Tower.webp">

<div class="content">

<h2>Eiffel Tower</h2>

<button id="selectBtn">

Display Hologram

</button>

</div>

</div>

</div>

<!-- Loading Modal -->

<div id="loadingModal" class="modal">

    <div class="modal-box">

        <div class="icon">🗼</div>

        <h2>Eiffel Tower Selected</h2>

        <p id="statusText">
            Connecting to Holographic Display...
        </p>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <p class="percent" id="percentText">0%</p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
